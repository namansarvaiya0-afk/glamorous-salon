<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal | Glamorous Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --black-deep: #050505;
            --black-surface: #0a0a0b;
            --radius: 20px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--black-deep);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; color: white;
            overflow: hidden;
        }

        .ambient-glow {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a150a 0%, transparent 60%);
        }

        .auth-card {
            background: var(--black-surface);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: var(--radius);
            width: 100%; max-width: 440px;
            padding: 60px 45px;
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 100px rgba(212, 175, 55, 0.05);
            position: relative;
            animation: cardFade 0.8s ease;
        }

        @keyframes cardFade { from { opacity: 0; transform: translateY(10px); } }

        .auth-card::before {
            content: ''; position: absolute; top:0; left:0; right:0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        }

        .header { text-align: center; margin-bottom: 45px; }
        .header .icon-box {
            width: 70px; height: 70px; margin: 0 auto 25px;
            border: 2px solid var(--gold-primary); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            transform: rotate(45deg); box-shadow: 0 0 20px var(--gold-glow);
        }
        .header .icon-box i { font-size: 30px; color: var(--gold-primary); transform: rotate(-45deg); }
        .header h1 { font-family: 'Playfair Display'; font-size: 32px; letter-spacing: 1px; margin-bottom: 8px; }
        .header p { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--gold-primary); margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 16px 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4);
            font-family: inherit; font-size: 15px; color: white;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none; border-color: var(--gold-primary);
            background: rgba(255,255,255,0.03); box-shadow: 0 0 15px var(--gold-glow);
        }

        .pass-toggle { position: absolute; right: 20px; top: 42px; cursor: pointer; color: #555; }
        .pass-toggle:hover { color: var(--gold-primary); }

        .btn-auth {
            width: 100%; padding: 18px; border-radius: 50px; border: 1px solid var(--gold-primary);
            background: transparent; color: var(--gold-primary);
            font-size: 14px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px;
            transition: all 0.4s; margin-top: 10px;
        }
        .btn-auth:hover { background: var(--gold-primary); color: var(--black-deep); box-shadow: 0 0 30px var(--gold-glow); }

        .back-link { text-align: center; margin-top: 30px; font-size: 13px; }
        .back-link a { color: #666; text-decoration: none; transition: 0.3s; }
        .back-link a:hover { color: white; }

        .alert {
            padding: 12px; border-radius: 8px; margin-bottom: 20px;
            text-align: center; font-size: 13px; display: none; font-weight: 600;
        }
        .alert-error { background: rgba(220, 38, 38, 0.1); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.2); }
        .alert-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="auth-card">
        <div class="header">
            <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
            <h1>Admin Access</h1>
            <p>Admin Login</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form onsubmit="handleAdminLogin(event)">
            <div class="input-group">
                <label>Identifier</label>
                <input type="text" id="adminId" required placeholder="Manager ID">
            </div>

            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="adminPassword" required placeholder="••••••••">
                <i class="fas fa-eye pass-toggle" onclick="togglePass('adminPassword', this)"></i>
            </div>

            <button type="submit" class="btn-auth">Login</button>

            <div class="back-link">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Return to Client Entrance</a>
            </div>
        </form>
    </div>

    <script>
        function togglePass(id, icon) {
            const el = document.getElementById(id);
            if(el.type === 'password') {
                el.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                el.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('adminId').value;
            const password = document.getElementById('adminPassword').value;
            const alert = document.getElementById('alertBox');

            try {
                const response = await fetch('https://glamoroussalon.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.user.role === 'admin') {
                    alert.textContent = "Authenticating... Access Granted.";
                    alert.className = "alert alert-success";
                    alert.style.display = "block";
                    
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    
                    setTimeout(() => window.location.href = 'admin-dashboard.html', 1500);
                } else {
                    alert.textContent = (data.user && data.user.role !== 'admin') ? "Insufficient privileges." : "Invalid Credentials. Access Denied.";
                    alert.className = "alert alert-error";
                    alert.style.display = "block";
                }
            } catch (error) {
                console.error('Error:', error);
                alert.textContent = "Connection to server failed.";
                alert.className = "alert alert-error";
                alert.style.display = "block";
            }
        }
    </script>
</body>
</html>
