<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Glamorous Studio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink-primary: #ff2d75;
            --black-rich: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.82);
            --radius: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--black-rich);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 70% 20%, #2d0a1a 0%, transparent 45%),
                radial-gradient(circle at 10% 80%, #1a150a 0%, transparent 45%);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: var(--radius);
            width: 100%;
            max-width: 460px;
            padding: 60px 45px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            animation: cardScaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardScaleIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
        }

        .header i {
            font-size: 44px;
            color: var(--pink-primary);
            margin-bottom: 25px;
            display: block;
        }

        .header h1 {
            font-family: 'Playfair Display';
            font-size: 38px;
            color: var(--black-rich);
            margin-bottom: 8px;
        }

        .header p {
            color: #555;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--black-rich);
            margin-bottom: 10px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px;
            border-radius: 15px;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 16px;
            color: var(--black-rich);
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--pink-primary);
            background: white;
            box-shadow: 0 10px 25px rgba(255, 45, 117, 0.08);
        }

        .pass-toggle {
            position: absolute;
            right: 20px;
            top: 48px;
            cursor: pointer;
            color: #888;
            font-size: 18px;
        }

        .pass-toggle:hover {
            color: var(--pink-primary);
        }

        .btn-luxury {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: none;
            background: var(--black-rich);
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-luxury:hover {
            background: var(--pink-primary);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(255, 45, 117, 0.25);
        }

        .footer-links {
            text-align: center;
            margin-top: 35px;
            font-size: 15px;
            color: #555;
        }

        .footer-links a {
            color: var(--pink-primary);
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .footer-links a:hover {
            border-bottom-color: var(--pink-primary);
        }

        .admin-entry {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
            font-size: 13px;
            color: #777;
        }

        .admin-entry a {
            color: var(--black-rich);
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
        }

        .alert-success {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #d1fae5;
        }

        @media (max-width: 480px) {
            body { padding: 15px; }
            .auth-card {
                padding: 40px 25px;
                border-radius: 20px;
                max-width: 100%;
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            }
            .header h1 { font-size: 30px; letter-spacing: -0.5px; }
            .header p { font-size: 15px; }
            .header i { font-size: 38px; margin-bottom: 20px; }
            .input-group input { padding: 16px 18px; font-size: 16px; border-radius: 12px; }
            .btn-luxury { padding: 18px; font-size: 16px; border-radius: 12px; height: 58px; }
            .footer-links { font-size: 14px; margin-top: 30px; }
            #forgotPanel h3 { font-size: 22px; }
        }

        /* Fixed issues for small height devices */
        @media (max-height: 700px) {
            body { align-items: flex-start; padding-top: 40px; }
            .auth-card { padding: 30px 25px; }
            .header { margin-bottom: 30px; }
        }

    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div class="auth-card">
        <div class="header">
            <a href="index.html"><i class="fas fa-spa"></i></a>
            <h1>Welcome Back</h1>
            <p>Continue your luxury journey</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@luxury.com">
            </div>

            <div class="input-group">
                <label>Master Password</label>
                <input type="password" id="password" required placeholder="••••••••">
                <i class="fas fa-eye pass-toggle" onclick="togglePass('password', this)"></i>
            </div>

            <button type="submit" class="btn-luxury">Login <i class="fas fa-sign-in-alt"></i></button>

            <div class="footer-links">
                <a href="#" onclick="showForgotPanel(event)" style="font-size: 14px;">Forgot Master Password?</a><br><br>
                New to the Studio? <a href="register.html">Become a member</a>
            </div>

            <div class="admin-entry">
                Internal Access Only? <a href="admin-login.html">Admin Portal</a>
            </div>
        </form>

        <!-- Forgot Password Panel -->
        <div id="forgotPanel" style="display: none; width: 100%;">
            <div style="text-align: center; margin-bottom: 25px;">
                <h3 style="font-family: 'Playfair Display'; font-size: 24px; color: var(--black-rich);">Reset Access</h3>
                <p style="color: #777; font-size: 14px;">Secure verification process</p>
            </div>
            
            <div id="stepEmail">
                <div class="input-group">
                    <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
                </div>
                <button type="button" class="btn-luxury" onclick="sendOTP()">Send OTP <i class="fas fa-envelope"></i></button>
            </div>

            <div id="stepOtp" style="display: none;">
                <div class="input-group">
                    <input type="text" id="resetOtp" placeholder="Enter 6-digit OTP" maxlength="6" required>
                </div>
                <button type="button" class="btn-luxury" onclick="verifyOTP()">Verify OTP <i class="fas fa-check-circle"></i></button>
                <div style="margin-top: 15px;">
                    <a href="#" onclick="resendOTP(event)" style="color: var(--pink-primary); font-size: 14px; text-decoration: none; font-weight: 500;">Didn't receive? Resend OTP</a>
                </div>
            </div>

            <div id="stepNewPass" style="display: none;">
                <div class="input-group">
                    <input type="password" id="resetNewPass" placeholder="Enter new password" required>
                </div>
                <button type="button" class="btn-luxury" onclick="resetPassword()">Confirm Security Update <i class="fas fa-lock"></i></button>
            </div>

            <div style="text-align: center; margin-top: 25px;">
                <a href="#" onclick="showLoginPanel(event)" style="color: #888; font-size: 14px; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='var(--pink-primary)'" onmouseout="this.style.color='#888'"><i class="fas fa-arrow-left"></i> Return to Login</a>
            </div>
        </div>
    </div>

        <script>
            function showForgotPanel(e) {
                e.preventDefault();
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('forgotPanel').style.display = 'block';
                document.getElementById('stepEmail').style.display = 'block';
                document.getElementById('stepOtp').style.display = 'none';
                document.getElementById('stepNewPass').style.display = 'none';
            }

            function showLoginPanel(e) {
                e.preventDefault();
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('forgotPanel').style.display = 'none';
            }

            let currentResetEmail = '';
            let validOTP = '';

            async function sendOTP() {
                const email = document.getElementById('resetEmail').value.trim();
                if (!email) return alert('Please enter your email.');
                
                currentResetEmail = email;
                try {
                    const res = await fetch("/api/forgot-password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        alert("OTP sent to your email! (Check backend terminal for simulation)");
                        document.getElementById('stepEmail').style.display = 'none';
                        document.getElementById('stepOtp').style.display = 'block';
                    } else {
                        alert(data.error || "Email not found.");
                    }
                } catch(e) {
                    alert("Error connecting to server.");
                }
            }

            async function resendOTP(e) {
                if(e) e.preventDefault();
                if (!currentResetEmail) return alert('No email found to resend OTP.');
                
                try {
                    const res = await fetch("/api/forgot-password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: currentResetEmail })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        alert("A new OTP has been sent successfully!");
                    } else {
                        alert(data.error || "Failed to resend OTP.");
                    }
                } catch(err) {
                    alert("Error connecting to server.");
                }
            }

            async function verifyOTP() {
                const otp = document.getElementById('resetOtp').value.trim();
                if (!otp) return alert('Please enter the OTP.');
                
                validOTP = otp;
                try {
                    const res = await fetch("/api/verify-otp", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: currentResetEmail, otp })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        alert("OTP Verified Successfully.");
                        document.getElementById('stepOtp').style.display = 'none';
                        document.getElementById('stepNewPass').style.display = 'block';
                    } else {
                        alert(data.error || "Invalid OTP.");
                    }
                } catch(e) {
                    alert("Error verifying OTP.");
                }
            }

            async function resetPassword() {
                const newPassword = document.getElementById('resetNewPass').value.trim();
                if (!newPassword || newPassword.length < 6) return alert('Password must be at least 6 characters.');
                
                try {
                    const res = await fetch("/api/reset-password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: currentResetEmail, otp: validOTP, newPassword })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        alert("Password successfully updated! You can now login.");
                        document.getElementById('loginForm').style.display = 'block';
                        document.getElementById('forgotPanel').style.display = 'none';
                    } else {
                        alert(data.error || "Failed to update password.");
                    }
                } catch(e) {
                    alert("Error resetting password.");
                }
            }

            function togglePass(inputId, icon) {
                const input = document.getElementById(inputId);
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            }

            document.getElementById("loginForm").addEventListener("submit", function (e) {
                e.preventDefault();

                const email = document.querySelector("#email").value;
                const password = document.querySelector("#password").value;

                fetch("/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ email, password }),
                })
                    .then((res) => res.json())
                    .then((data) => {
                        console.log(data); // debug ke liye

                        // Ensure we handle either logical check
                        if (data.success || data.token) {
                            // ✅ user save karo
                            localStorage.setItem("user", JSON.stringify(data.user));
                            localStorage.setItem("token", data.token);

                            // ✅ redirect karo
                            window.location.href = "dashboard.html";
                        } else {
                            alert(data.message || data.error || "Login failed");
                        }
                    })
                    .catch((err) => {
                        console.error(err);
                        alert("Something went wrong");
                    });
            });
        </script>
</body>

</html>
