<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Glamorous Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff3366;
            --secondary: #6c5ce7;
            --dark: #0f0c29;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a0b2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            color: var(--text-main);
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s infinite ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            width: 100%; max-width: 440px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header-icon { 
            width: 70px; height: 70px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 10px 25px rgba(255, 51, 102, 0.4);
        }
        .header-icon i { font-size: 30px; color: white; }
        
        .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(to right, #fff, #eca0b6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); font-size: 15px; font-weight: 300; }

        .input-group { position: relative; margin-bottom: 25px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; padding-left: 5px; }
        
        .btn-luxury {
            width: 100%; padding: 18px; border-radius: var(--radius-md); border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-family: inherit; font-size: 16px; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2);
            position: relative; overflow: hidden;
        }
        .btn-luxury::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .btn-luxury:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(255, 51, 102, 0.35); }
        .btn-luxury:hover::after { opacity: 1; }
        .btn-luxury:active { transform: translateY(1px); }
        .btn-luxury:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .footer-links { text-align: center; margin-top: 35px; font-size: 14px; color: var(--text-muted); }
        .footer-links a { color: var(--primary); font-weight: 600; text-decoration: none; transition: 0.3s; }
        .footer-links a:hover { color: white; text-shadow: 0 0 10px var(--primary); }

        .spinner {
            display: none; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .alert {
            padding: 16px; border-radius: var(--radius-md); margin-bottom: 25px;
            text-align: center; font-size: 14px; font-weight: 600; display: none;
            backdrop-filter: blur(10px);
        }
        .alert-error { background: rgba(220, 38, 38, 0.15); color: #fca5a5; border: 1px solid rgba(220, 38, 38, 0.3); }
        .alert-success { background: rgba(21, 128, 61, 0.15); color: #86efac; border: 1px solid rgba(21, 128, 61, 0.3); }

        .otp-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .otp-grid input { 
            text-align: center; font-size: 24px; font-weight: 700; padding: 16px 0;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white; transition: 0.3s;
        }
        .otp-grid input:focus {
            outline: none; border-color: var(--secondary);
            background: rgba(0,0,0,0.5); box-shadow: 0 0 15px rgba(108, 92, 231, 0.3);
            transform: translateY(-2px);
        }
        
        button { z-index: 9999; position: relative; }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-card">
        <div class="header">
            <div class="header-icon"><i class="fas fa-shield-alt"></i></div>
            <h1>Verification</h1>
            <p>Enter the 6-digit code sent to your email</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="input-group">
            <label>Verification Code</label>
            <div class="otp-grid">
                <input type="text" maxlength="1" oninput="moveFocus(this, 1)">
                <input type="text" maxlength="1" oninput="moveFocus(this, 2)">
                <input type="text" maxlength="1" oninput="moveFocus(this, 3)">
                <input type="text" maxlength="1" oninput="moveFocus(this, 4)">
                <input type="text" maxlength="1" oninput="moveFocus(this, 5)">
                <input type="text" maxlength="1" oninput="moveFocus(this, 6)">
            </div>
        </div>
        
        <button class="btn-luxury" onclick="verifyOTP()">
            <span class="btn-text">Verify Code</span>
            <i class="fas fa-check-circle"></i>
            <div class="spinner"></div>
        </button>
        
        <div class="footer-links">
            <a href="forgot-password.html">Go Back</a>
        </div>
    </div>

    <script>
        const userEmail = localStorage.getItem('recoveryEmail');
        
        if (!userEmail) {
            window.location.href = 'forgot-password.html';
        }

        function moveFocus(el, index) {
            if (el.value.length === 1 && index < 6) {
                document.querySelectorAll('.otp-grid input')[index].focus();
            }
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function setLoading(btn, isLoading) {
            const text = btn.querySelector('.btn-text');
            const icon = btn.querySelector('i');
            const spinner = btn.querySelector('.spinner');
            btn.disabled = isLoading;
            text.style.display = isLoading ? 'none' : 'block';
            icon.style.display = isLoading ? 'none' : 'block';
            spinner.style.display = isLoading ? 'block' : 'none';
        }

        async function verifyOTP() {
            const inputs = document.querySelectorAll('.otp-grid input');
            const otp = Array.from(inputs).map(i => i.value).join('');
            
            if (otp.length < 6) return showAlert('Enter full 6-digit code', 'error');

            const btn = document.querySelector('.btn-luxury');
            setLoading(btn, true);

            try {
                const res = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('OTP Verified! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'reset-password.html', 1500);
                } else {
                    showAlert(data.error || 'Invalid OTP', 'error');
                }
            } catch (e) {
                showAlert('Server connection error', 'error');
            } finally {
                setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
