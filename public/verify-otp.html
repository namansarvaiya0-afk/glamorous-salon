<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#16a34a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Verify OTP - Parivar Mart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --green-primary: #16a34a;
            --green-dark: #15803d;
            --green-light: #22c55e;
            --orange-accent: #f97316;
            --black-rich: #0f172a;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f0fdf4;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(22, 163, 74, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(249, 115, 22, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(22, 163, 74, 0.08) 0%, transparent 40%);
        }

        .floating-icons {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .float-icon {
            position: absolute;
            font-size: 24px;
            opacity: 0.1;
            animation: float 15s infinite ease-in-out;
        }
        
        .float-icon:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .float-icon:nth-child(2) { top: 20%; right: 15%; animation-delay: -3s; font-size: 30px; }
        .float-icon:nth-child(3) { bottom: 25%; left: 8%; animation-delay: -6s; }
        .float-icon:nth-child(4) { bottom: 15%; right: 10%; animation-delay: -9s; font-size: 28px; }
        .float-icon:nth-child(5) { top: 50%; left: 20%; animation-delay: -12s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .auth-card {
            background: var(--glass);
            border-radius: 24px;
            padding: 45px 40px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(22, 163, 74, 0.1);
            backdrop-filter: blur(20px);
            text-align: center;
            animation: cardFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-wrap { margin-bottom: 25px; }
        
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 30px rgba(22, 163, 74, 0.25);
        }
        
        .logo-icon i {
            font-size: 32px;
            color: white;
        }

        .brand-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--green-dark);
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--black-rich);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .email-display {
            background: var(--green-soft);
            color: var(--green-dark);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 25px;
            display: inline-block;
        }

        .otp-grid { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin: 20px 0 30px; 
        }
        
        .otp-grid input { 
            width: 48px; 
            height: 56px; 
            text-align: center; 
            font-size: 24px; 
            font-weight: 700; 
            border-radius: 12px; 
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            color: var(--text-dark);
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        
        .otp-grid input:focus {
            outline: none;
            border-color: var(--green-primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
            transform: scale(1.05);
        }
        
        .otp-grid input::placeholder { 
            color: #cbd5e1; 
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(22, 163, 74, 0.35);
            filter: brightness(1.1);
        }

        .btn-primary:disabled {
            background: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .footer-links {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--green-primary);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: var(--green-dark);
            text-decoration: underline;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.4s easeOut;
            font-weight: 500;
        }
        
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 540px) {
            .auth-card {
                padding: 35px 25px;
                border-radius: 20px;
            }
            
            .otp-grid input {
                width: 42px;
                height: 50px;
                font-size: 20px;
            }
            
            .otp-grid {
                gap: 8px;
            }
            
            .logo-icon {
                width: 60px;
                height: 60px;
            }
            
            .logo-icon i {
                font-size: 26px;
            }
        }

        @media (max-width: 380px) {
            .auth-card {
                padding: 30px 18px;
            }
            
            body {
                padding: 15px;
            }
            
            .otp-grid input {
                width: 38px;
                height: 46px;
                font-size: 18px;
            }
            
            .otp-grid {
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="floating-icons">
        <i class="fas fa-shopping-cart float-icon" style="color: var(--green-primary);"></i>
        <i class="fas fa-apple-alt float-icon" style="color: var(--orange-accent);"></i>
        <i class="fas fa-leaf float-icon" style="color: var(--green-primary);"></i>
        <i class="fas fa-box float-icon" style="color: var(--green-dark);"></i>
        <i class="fas fa-store float-icon" style="color: var(--green-primary);"></i>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div class="brand-name">Parivar Mart</div>
            </div>
            
            <div class="header">
                <h1>Verify Your Email</h1>
                <p>Enter the 6-digit code sent to your email address</p>
            </div>

            <div class="email-display">
                <i class="fas fa-envelope"></i> 
                <span id="emailDisplay"></span>
            </div>

            <div id="alertBox" class="alert"></div>

            <div class="otp-grid">
                <input type="text" id="otp_1" maxlength="1" oninput="moveFocus(this, 1)" placeholder="0">
                <input type="text" id="otp_2" maxlength="1" oninput="moveFocus(this, 2)" placeholder="0">
                <input type="text" id="otp_3" maxlength="1" oninput="moveFocus(this, 3)" placeholder="0">
                <input type="text" id="otp_4" maxlength="1" oninput="moveFocus(this, 4)" placeholder="0">
                <input type="text" id="otp_5" maxlength="1" oninput="moveFocus(this, 5)" placeholder="0">
                <input type="text" id="otp_6" maxlength="1" oninput="moveFocus(this, 6)" placeholder="0">
            </div>
            
            <input type="hidden" id="email">
            
            <script>
                const emailFromStorage = localStorage.getItem('recoveryEmail');
                if(emailFromStorage) {
                    document.getElementById('email').value = emailFromStorage;
                    document.getElementById('emailDisplay').textContent = emailFromStorage;
                }
            </script>

            <button class="btn-primary" id="verifyBtn" onclick="verifyOTP()">
                <span class="btn-text">Verify Code</span>
                <i class="fas fa-check-circle"></i>
                <div class="spinner"></div>
            </button>
            
            <div class="footer-links">
                <a href="forgot-password.html"><i class="fas fa-arrow-left"></i> Go Back</a>
            </div>
        </div>
    </div>

    <script>
        const userEmail = localStorage.getItem('recoveryEmail');
        
        if (!userEmail) {
            window.location.href = 'forgot-password.html';
        }

        function moveFocus(el, index) {
            const inputs = document.querySelectorAll('.otp-grid input');
            
            if (el.value.length === 1 && index < 6) {
                inputs[index].focus();
            }
            
            if (el.value === '' && index > 1) {
                inputs[index - 2].focus();
            }
            
            checkComplete();
        }

        function checkComplete() {
            const inputs = document.querySelectorAll('.otp-grid input');
            const otp = Array.from(inputs).map(i => i.value).join('');
        }

        document.querySelectorAll('.otp-grid input').forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                const allInputs = document.querySelectorAll('.otp-grid input');
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    allInputs[index - 1].focus();
                }
            });
        });

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function setLoading(btn, isLoading) {
            const text = btn.querySelector('.btn-text');
            const icon = btn.querySelector('i:not(.spinner)');
            const spinner = btn.querySelector('.spinner');
            btn.disabled = isLoading;
            text.style.display = isLoading ? 'none' : 'block';
            icon.style.display = isLoading ? 'none' : 'inline';
            spinner.style.display = isLoading ? 'inline-block' : 'none';
        }

        async function verifyOTP() {
            const email = document.getElementById("email").value;
            const inputs = document.querySelectorAll('.otp-grid input');
            const otpValue = Array.from(inputs).map(i => i.value).join('');
            
            if (otpValue.length < 6) {
                return showAlert('Please enter the full 6-digit code', 'error');
            }

            const btn = document.getElementById('verifyBtn');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, otp: otpValue })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('otpVerified', 'true');
                    showAlert('OTP Verified! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'reset-password.html', 1500);
                } else {
                    showAlert(data.error || data.message || 'Invalid OTP', 'error');
                    inputs.forEach(input => input.value = '');
                    inputs[0].focus();
                }
            } catch (e) {
                showAlert('Server connection error', 'error');
            } finally {
                setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
