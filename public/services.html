<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#e91e63">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Curated Services | Glamorous Studio Salon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root {
            --pink-primary: #e91e63;
            --pink-soft: #ff85a1;
            --gold-primary: #d4af37;
            --gold-soft: #f4d03f;
            --white: #ffffff;
            --black-rich: #0f172a;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-premium: 0 10px 40px -10px rgba(0,0,0,0.1);
            --pink-light: rgba(233, 30, 99, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }
        h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }

        .navbar {
            position: sticky; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 80px; background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); box-shadow: var(--shadow-premium);
        }

        .logo { display: flex; align-items: center; gap: 12px; font-size: 26px; font-weight: 700; color: var(--black-rich); text-decoration: none; }
        .logo i { color: var(--pink-primary); transform: rotate(-10deg); }
        
        .mobile-toggle { display: none; cursor: pointer; font-size: 24px; color: var(--text-dark); }

        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        
        .page-header { text-align: center; margin-bottom: 50px; }
        .page-header h1 { font-size: 48px; color: var(--black-rich); margin-bottom: 12px; }
        .page-header p { color: var(--text-muted); font-size: 18px; font-weight: 300; }

        /* Premium Tabs */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .tab-btn {
            padding: 14px 35px; border-radius: 50px; font-weight: 600; font-size: 14px;
            cursor: pointer; border: 2px solid rgba(233, 30, 99, 0.1);
            background: var(--white); color: var(--text-muted);
            transition: 0.4s; letter-spacing: 0.5px;
        }
        .tab-btn.active {
            background: var(--pink-primary); color: white; border-color: var(--pink-primary);
            box-shadow: 0 10px 20px -5px rgba(233, 30, 99, 0.3);
        }
        .tab-btn:hover:not(.active) { border-color: var(--pink-soft); color: var(--pink-primary); }

        /* Enhanced Cards */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 35px; }
        
        .premium-card {
            background: var(--white); border-radius: 32px; overflow: hidden;
            box-shadow: var(--shadow-premium); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.03); position: relative;
        }
        .premium-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
        .premium-card.selected { border: 2px solid var(--pink-primary); }
        .premium-card.best-value { border: 2px solid var(--gold-primary); }

        .card-img-wrap { height: 220px; position: relative; overflow: hidden; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .premium-card:hover .card-img-wrap img { transform: scale(1.1); }
        
        .badge {
            position: absolute; top: 20px; right: 20px; padding: 6px 16px; border-radius: 50px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; color: white; letter-spacing: 1px; z-index: 2;
        }
        .badge.pop { background: var(--pink-primary); }
        .badge.gold { background: linear-gradient(135deg, var(--gold-primary), #b8860b); }

        .card-content { padding: 35px; }
        .card-content h3 { font-size: 24px; font-weight: 700; color: var(--black-rich); margin-bottom: 12px; }
        .card-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; line-height: 1.6; min-height: 45px; }

        /* Service List */
        .s-list { list-style: none; margin-bottom: 30px; }
        .s-list li {
            padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.04);
            display: flex; justify-content: space-between; font-size: 14px; color: var(--text-dark);
        }
        .s-list li span:last-child { color: var(--text-muted); text-decoration: line-through; font-size: 12px; }

        .price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 30px; }
        .new-p { font-size: 36px; font-weight: 800; color: var(--pink-primary); }
        .old-p { font-size: 18px; color: var(--text-muted); text-decoration: line-through; }
        .save-tag { background: #dcfce7; color: #166534; padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 700; }

        .action-btn {
            width: 100%; padding: 16px; border-radius: 16px; font-weight: 700; font-size: 15px;
            cursor: pointer; border: none; transition: 0.3s;
        }
        .action-btn.primary { background: linear-gradient(135deg, var(--pink-primary), #c2185b); color: white; box-shadow: 0 10px 20px -5px rgba(233, 30, 99, 0.2); }
        .action-btn.gold { background: linear-gradient(135deg, var(--gold-primary), #b8860b); color: white; }
        .action-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Floating Selection Tray */
        .selection-tray {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 900px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px 40px; border-radius: 100px; display: flex;
            justify-content: space-between; align-items: center;
            color: white; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tray-left { display: flex; align-items: center; gap: 25px; }
        .tray-count { background: var(--pink-primary); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
        .tray-total { font-size: 24px; font-weight: 700; color: var(--pink-soft); }

        /* Premium Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--white); border-radius: 40px; padding: 50px;
            max-width: 650px; width: 100%; position: relative;
            animation: modalIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } }
        
        .modal-close { position: absolute; top: 25px; right: 25px; border: none; background: var(--bg-light); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: var(--text-muted); transition: 0.3s; }
        .modal-close:hover { background: var(--pink-light); color: var(--pink-primary); transform: rotate(90deg); }

        .selected-service-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--bg-light);
        }
        .selected-service-item:last-child { border-bottom: none; }
        .selected-service-item .name { font-weight: 500; color: var(--text-dark); }
        .selected-service-item .price { font-size: 18px; color: var(--pink-primary); }
        
        .total-section {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-top: 2px solid var(--bg-light); margin-top: 10px;
        }
        .total-section .total-label { font-size: 18px; font-weight: 600; color: var(--black-rich); }
        .total-section .total-amount { font-size: 28px; font-weight: 700; color: var(--pink-primary); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; font-size: 14px; }
        .form-group input, .form-group select {
            width: 100%; padding: 14px 16px; border: 2px solid var(--bg-light);
            border-radius: 12px; font-size: 15px; transition: all 0.3s ease; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--pink-primary);
            box-shadow: 0 0 0 4px rgba(233, 30, 99, 0.1);
        }

        /* --- LUXURY MOBILE ADAPTATIONS --- */
        @media (max-width: 1024px) {
            .navbar { padding: 15px 30px; }
            .grid-cards { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; }
            .logo span { font-size: 22px; }
            
            .page-header { margin-bottom: 30px; }
            .page-header h1 { font-size: 34px; }
            .page-header p { font-size: 15px; }

            .tabs { 
                justify-content: flex-start; 
                overflow-x: auto; 
                padding: 0 10px 15px; 
                gap: 10px;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .tabs::-webkit-scrollbar { display: none; }
            .tab-btn { padding: 10px 24px; font-size: 13px; white-space: nowrap; }

            .grid-cards { grid-template-columns: 1fr; gap: 20px; }
            .premium-card { border-radius: 20px; }
            .card-img-wrap { height: 180px; }
            .card-content { padding: 25px; }
            .card-content h3 { font-size: 20px; }
            .new-p { font-size: 28px; }
            .modal-content { padding: 30px 20px; border-radius: 25px; }
            .modal-content form > div:first-child { grid-template-columns: 1fr !important; }
            .selection-tray {
                flex-direction: column;
                gap: 15px;
                border-radius: 20px;
                max-width: 95%;
            }
            .tray-left { width: 100%; justify-content: center; }
            .selection-tray > div:last-child { width: 100%; justify-content: center; }
            .selection-tray .action-btn { width: 100% !important; }
        }

        @media (max-width: 480px) {
            .page-header h1 { font-size: 32px; }
            .page-header p { font-size: 14px; }
            .grid-cards { gap: 20px; }
            .premium-card { border-radius: 20px; }
            .card-content { padding: 20px; }
            .card-content h3 { font-size: 18px; }
            .s-list li { font-size: 12px; }
            .action-btn { padding: 14px; font-size: 14px; }
        }
        
        @media (max-width: 768px) {
            .mobile-toggle { display: block; }
            .nav-links { display: none; }
            .navbar { flex-wrap: wrap; }
            .navbar.mobile-open .nav-links {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                padding: 20px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                gap: 15px;
            }
            .navbar.mobile-open .nav-links a {
                padding: 12px 0;
                border-bottom: 1px solid #eee;
                text-align: center;
                color: var(--text-dark);
                text-decoration: none;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="servicesNav">
        <a href="index.html" class="logo">
            <i class="fas fa-spa"></i>
            <span>Glamorous</span>
        </a>
        <div class="nav-links" style="display: flex; gap: 30px; align-items: center;">
            <a href="index.html" style="text-decoration: none; color: var(--text-dark); font-weight: 500;">Home</a>
            <a href="dashboard.html" style="text-decoration: none; color: var(--text-dark); font-weight: 500;">My Dashboard</a>
        </div>
        <i class="fas fa-bars mobile-toggle" onclick="toggleMobileMenu()"></i>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Our Curated Services</h1>
            <p>Select from our individual treatments or indulge in our Signature Experiences</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-individual" onclick="switchTab('individual')">Treatments</button>
            <button class="tab-btn" id="tab-combo" onclick="switchTab('combo')">Signature Experiences</button>
        </div>

        <!-- Experience Categories (Sub-nav) -->
        <div id="experience-categories" style="display: none; justify-content: center; gap: 10px; margin-bottom: 40px; animation: fadeIn 0.5s;">
            <button class="tab-btn small active" onclick="filterCombos('All')">All</button>
            <button class="tab-btn small" onclick="filterCombos('Signature')">Signature</button>
            <button class="tab-btn small" onclick="filterCombos('Therapy')">Therapy</button>
            <button class="tab-btn small" onclick="filterCombos('Artistry')">Artistry</button>
        </div>

        <!-- Combo Section -->
        <div id="combo-section" class="grid-cards" style="display: none;">
            <!-- Data populated via JS -->
        </div>

        <!-- Individual Section -->
        <div id="individual-section">
            <div id="selection-tray" class="selection-tray" style="display: none;">
                <div class="tray-left">
                    <div class="tray-count" id="selected-count">0</div>
                    <div>
                        <div style="font-weight: 700; letter-spacing: 0.5px;">SERVICES SELECTED</div>
                        <div style="font-size: 11px; opacity: 0.6;">Ready to finalize your session?</div>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 30px;">
                    <div class="tray-total" id="tray-total">₹0</div>
                    <button class="action-btn primary" style="width: 180px;" onclick="openBookingModal()">Book Session</button>
                </div>
            </div>

            <div class="grid-cards" id="services-grid">
                <!-- Data populated via JS -->
            </div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('bookingModal')"><i class="fas fa-times"></i></button>
            <h2 style="font-family: 'Playfair Display'; font-size: 32px; margin-bottom: 30px; text-align: center;">Secure Your Session</h2>
            
            <div id="modal-service-summary" style="background: var(--bg-light); padding: 25px; border-radius: 20px; margin-bottom: 30px;">
                <!-- Summary inserted here -->
            </div>

            <form onsubmit="handleBooking(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                    <div class="form-group">
                        <label>Appointment Date</label>
                        <input type="date" id="bookingDate" required>
                    </div>
                    <div class="form-group">
                        <label>Preferred Time</label>
                        <select id="bookingTime" required>
                            <option value="">Choose Time</option>
                            <option value="10:00 AM">10:00 AM</option>
                            <option value="12:00 PM">12:00 PM</option>
                            <option value="02:00 PM">02:00 PM</option>
                            <option value="04:00 PM">04:00 PM</option>
                            <option value="06:00 PM">06:00 PM</option>
                        </select>
                    </div>
                </div>
                
                <div style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 15px; font-weight: 600;">Payment Method</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <label style="display: flex; align-items: center; gap: 10px; padding: 15px; border: 2px solid var(--pink-primary); border-radius: 15px; cursor: pointer; background: var(--pink-light);">
                            <input type="radio" name="payment" value="online" checked>
                            <span>Pay Now</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 10px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 15px; cursor: pointer;">
                            <input type="radio" name="payment" value="pay_at_salon">
                            <span>Pay at Salon</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="action-btn primary" style="padding: 20px;">Confirm & Secure Booking</button>
            </form>
        </div>
    </div>

    <script>
        function toggleMobileMenu() {
            const nav = document.getElementById('servicesNav');
            nav.classList.toggle('mobile-open');
        }
        
        // Sync with API Managed Services
        let services = [];
        
        async function loadServices() {
            try {
                const response = await fetch('/api/services');
                if (response.ok) {
                    const data = await response.json();
                    services = data.map(s => ({...s, img: s.image || s.img}));
                } else {
                    throw new Error('Fallback to local');
                }
            } catch (e) {
                // Fallback to defaults if API fails
                services = [
                    { id: 1, name: 'Architectural Cut', price: 1200, category: 'Artistry', img: 'https://images.unsplash.com/photo-1560066984-138dadb4c035?w=600&fit=crop' },
                    { id: 2, name: 'Molecular Facial', price: 2500, category: 'Therapy', img: 'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=600&fit=crop' },
                    { id: 3, name: 'Signature Balayage', price: 4500, category: 'Signature', img: 'https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=600&fit=crop' },
                    { id: 4, name: 'Bridal Artistry', price: 5000, category: 'Artistry', img: 'https://images.unsplash.com/photo-1457972729786-0411a3b2b626?w=600&fit=crop' },
                    { id: 5, name: 'Organic Head Spa', price: 1800, category: 'Therapy', img: 'https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=600&fit=crop' },
                    { id: 6, name: 'Premium Gold Facial', price: 3000, category: 'Signature', img: 'https://images.unsplash.com/photo-1512290923902-8a9f81dc2069?w=600&fit=crop' }
                ];
            }
            renderServices();
            updateStats();
        }

        const combos = [
            { 
                id: 101, 
                name: 'The Royal Transformation', 
                price: 6999, 
                oldPrice: 9000,
                category: 'Signature', 
                img: 'https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=800&fit=crop',
                desc: 'The ultimate 4-hour luxury escape for your complete renewal.',
                includes: ['Architectural Haircut', 'Molecular Skin Therapy', 'Signature Spa Therapy', 'Pedicure & Manicure']
            },
            { 
                id: 102, 
                name: 'Zen Garden Therapy', 
                price: 4499, 
                oldPrice: 5800,
                category: 'Therapy', 
                img: 'https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=800&fit=crop',
                desc: 'A calming journey focusing on deep relaxation and holistic wellness.',
                includes: ['Full Body Aromatherapy', 'Steam Bath', 'Organic Facial', 'Herbal Tea Service']
            },
            { 
                id: 103, 
                name: 'Artisan Bridal Glow', 
                price: 8999, 
                oldPrice: 12000,
                category: 'Artistry', 
                img: 'https://images.unsplash.com/photo-1457972729786-0411a3b2b626?w=800&fit=crop',
                desc: 'Exquisite bridal preparation for your most special day.',
                includes: ['HD Bridal Makeup', 'Advanced Hair Styling', 'Body Polishing', 'Jewelry Styling']
            },
            { 
                id: 104, 
                name: 'Molecular Skin Renewal', 
                price: 5999, 
                oldPrice: 7500,
                category: 'Artistry', 
                img: 'https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=800&fit=crop',
                desc: 'High-tech approach to age reversal and skin vitality.',
                includes: ['Hydra-Facial Max', 'LED Light Therapy', 'Oxygen Infusion', 'Peptide Mask']
            },
            { 
                id: 105, 
                name: 'Deep Tissue Serenity', 
                price: 3499, 
                oldPrice: 4500,
                category: 'Therapy', 
                img: 'https://images.unsplash.com/photo-1519823551278-64ac92734fb1?w=800&fit=crop',
                desc: 'Targeted muscle recovery and peace of mind.',
                includes: ['Deep Tissue Massage', 'Foot Reflexology', 'Hot Stone Addition']
            }
        ];

        let selectedIds = new Set();
        let currentBooking = null;
        let activeComboCategory = 'All';

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            const comboSec = document.getElementById('combo-section');
            const indivSec = document.getElementById('individual-section');
            const categoriesSec = document.getElementById('experience-categories');

            if (tab === 'combo') {
                comboSec.style.display = 'grid';
                indivSec.style.display = 'none';
                categoriesSec.style.display = 'flex';
                renderCombos();
            } else {
                comboSec.style.display = 'none';
                indivSec.style.display = 'block';
                categoriesSec.style.display = 'none';
                renderServices();
            }
        }

        function filterCombos(category) {
            activeComboCategory = category;
            document.querySelectorAll('#experience-categories .tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === category);
            });
            renderCombos();
        }

        function renderServices() {
            const grid = document.getElementById('services-grid');
            grid.innerHTML = services.map(s => `
                <div class="premium-card ${selectedIds.has(s.id) ? 'selected' : ''}" onclick="toggleService(${s.id})">
                    <div class="card-img-wrap">
                        <img src="${s.img}" alt="${s.name}">
                        <span class="badge" style="background: rgba(0,0,0,0.5); left: 20px; right: auto;">${s.category}</span>
                    </div>
                    <div class="card-content">
                        <h3>${s.name}</h3>
                        <p class="card-desc">Elite treatment using our signature techniques.</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 24px; font-weight: 700; color: var(--pink-primary);">₹${s.price}</span>
                            <div style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--pink-primary); display: flex; align-items: center; justify-content: center; color: var(--pink-primary);">
                                <i class="fas ${selectedIds.has(s.id) ? 'fa-check' : 'fa-plus'}"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            updateTray();
        }

        function renderCombos() {
            const grid = document.getElementById('combo-section');
            const filtered = activeComboCategory === 'All' ? combos : combos.filter(c => c.category === activeComboCategory);
            
            grid.innerHTML = filtered.map(c => `
                <div class="premium-card ${c.category === 'Signature' ? 'best-value' : ''}">
                    <div class="card-img-wrap">
                        <img src="${c.img}" alt="${c.name}">
                        <span class="badge ${c.category === 'Signature' ? 'gold' : 'pop'}">${c.category}</span>
                    </div>
                    <div class="card-content">
                        <h3>${c.name}</h3>
                        <p class="card-desc">${c.desc}</p>
                        <ul class="s-list">
                            ${c.includes.map(inc => `<li><span>${inc}</span></li>`).join('')}
                        </ul>
                        <div class="price-row">
                            <span class="new-p">₹${c.price.toLocaleString()}</span>
                            <span class="old-p">₹${c.oldPrice.toLocaleString()}</span>
                            <span class="save-tag">SAVE ${Math.round((1 - c.price/c.oldPrice) * 100)}%</span>
                        </div>
                        <button class="action-btn ${c.category === 'Signature' ? 'gold' : 'primary'}" onclick="selectCombo(${c.id})">Book Experience</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleService(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            renderServices();
        }

        function updateTray() {
            const tray = document.getElementById('selection-tray');
            const count = document.getElementById('selected-count');
            const total = document.getElementById('tray-total');
            
            if (selectedIds.size > 0) {
                tray.style.display = 'flex';
                count.textContent = selectedIds.size;
                let sum = 0;
                selectedIds.forEach(id => sum += services.find(s => s.id === id).price);
                total.textContent = '₹' + sum.toLocaleString();
            } else {
                tray.style.display = 'none';
            }
        }

        function selectCombo(id) {
            const c = combos.find(x => x.id === id);
            currentBooking = { name: c.name, price: c.price, includes: c.includes, type: 'combo' };
            openBookingModal();
        }

        function openBookingModal() {
            const user = localStorage.getItem('user');
            if (!user) {
                alert('Please sign in to confirm your booking.');
                window.location.href = 'login.html';
                return;
            }

            if (!currentBooking) {
                let sum = 0;
                let names = [];
                selectedIds.forEach(id => {
                    const s = services.find(sv => sv.id === id);
                    sum += s.price;
                    names.push(s.name);
                });
                currentBooking = { name: 'Custom Experience', price: sum, includes: names, type: 'individual' };
            }

            const summary = document.getElementById('modal-service-summary');
            summary.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span style="font-weight: 700; color: var(--black-rich);">${currentBooking.name}</span>
                    <span style="font-size: 24px; font-weight: 800; color: var(--pink-primary);">₹${currentBooking.price.toLocaleString()}</span>
                </div>
                <div style="font-size: 13px; color: var(--text-muted); line-height: 1.4;">
                    <strong>Includes:</strong> ${currentBooking.includes.join(', ')}
                </div>
            `;

            document.getElementById('bookingModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            currentBooking = null;
        }

        async function handleBooking(e) {
            e.preventDefault();
            const date = document.getElementById('bookingDate').value;
            const time = document.getElementById('bookingTime').value;
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (!user.email) {
                alert('Please login first to book an appointment!');
                window.location.href = 'login.html';
                return;
            }

            if (!date || !time) {
                alert('Please select date and time');
                return;
            }

            const bookingData = {
                userEmail: user.email,
                serviceName: currentBooking.name,
                price: parseFloat(currentBooking.price),
                date: date,
                time: time
            };

            if (paymentMethod === 'online') {
                await initiateOnlinePayment(bookingData);
            } else {
                await payAtSalon(bookingData);
            }
        }

        async function initiateOnlinePayment(bookingData) {
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const userName = localStorage.getItem('userName') || user.first_name || "Customer";

                // 1. Create Order on Backend (Now includes booking data)
                const res = await fetch("/api/payment/create-order", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        name: userName,
                        email: bookingData.userEmail,
                        service: bookingData.serviceName,
                        amount: bookingData.price 
                    })
                });

                if (!res.ok) throw new Error('Failed to create order');
                const order = await res.json();

                // 2. Open Razorpay Checkout
                const options = {
                    key: "rzp_live_SX4OStfJEgyome",
                    amount: order.amount,
                    currency: "INR",
                    name: "Glamorous Salon",
                    description: bookingData.serviceName,
                    order_id: order.id,
                    handler: async function (response) {
                        // 3. Verify Payment on Backend
                        const verifyRes = await fetch("/api/payment/verify-payment", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(response)
                        });

                        const verifyData = await verifyRes.json();

                        if (verifyData.success) {
                            alert("Booking Confirmed ✅ Securing your slot...");
                            // Submit the final appointment record (date/time) to the server
                            await submitBooking(bookingData, response.razorpay_payment_id);
                        } else {
                            alert("Payment Verification Failed ❌ Please try again or contact support.");
                        }
                    },
                    prefill: {
                        name: userName,
                        email: bookingData.userEmail
                    },
                    theme: { color: "#e91e63" }
                };

                const rzp = new Razorpay(options);
                rzp.open();

            } catch (err) {
                console.error(err);
                if (confirm("Payment failed. Would you like to pay at the salon instead?")) {
                    await payAtSalon(bookingData);
                }
            }
        }

        async function submitBooking(bookingData, paymentId = null) {
            try {
                console.log('Booking data:', bookingData);
                const response = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...bookingData, paymentId })
                });
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    alert('Luxury Experience Secured! Your journey is recorded.');
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || 'Reservation failed. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection to sanctuary lost. Please try again later.');
            }
        }

        async function payAtSalon(bookingData) {
            closeModal('bookingModal');
            try {
                console.log('Pay at Salon - Booking data:', bookingData);
                const response = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...bookingData, paymentMethod: 'pay_at_salon' })
                });
                const data = await response.json();

                if (response.ok) {
                    alert('Booking Confirmed! Pay ₹' + bookingData.price + ' at the salon.');
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || 'Booking failed. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error. Please try again.');
            }
        }

        // Initialize
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab') || 'individual';
        const cat = urlParams.get('category') || 'All';
        
        loadServices().then(() => {
            if (tab === 'combo') {
                switchTab('combo');
                filterCombos(cat);
            } else {
                switchTab('individual');
            }
        });
    </script>
</body>
