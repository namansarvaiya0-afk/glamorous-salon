<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Master Password - Glamorous Studio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink-primary: #ff2d75;
            --black-rich: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.82);
            --radius: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--black-rich);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 70% 20%, #2d0a1a 0%, transparent 45%),
                radial-gradient(circle at 10% 80%, #1a150a 0%, transparent 45%);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: var(--radius);
            width: 100%;
            max-width: 460px;
            padding: 60px 45px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            animation: cardScaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardScaleIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
        }

        .header i {
            font-size: 44px;
            color: var(--pink-primary);
            margin-bottom: 25px;
            display: block;
        }

        .header h1 {
            font-family: 'Playfair Display';
            font-size: 32px;
            color: var(--black-rich);
            margin-bottom: 8px;
        }

        .header p {
            color: #555;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--black-rich);
            margin-bottom: 10px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px;
            border-radius: 15px;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 16px;
            color: var(--black-rich);
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--pink-primary);
            background: white;
            box-shadow: 0 10px 25px rgba(255, 45, 117, 0.08);
        }

        .btn-luxury {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            border: none;
            background: var(--black-rich);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-luxury:hover {
            background: var(--pink-primary);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(255, 45, 117, 0.25);
        }

        .footer-links {
            text-align: center;
            margin-top: 35px;
            font-size: 14px;
            color: #555;
        }

        .footer-links a {
            color: var(--pink-primary);
            font-weight: 700;
            text-decoration: none;
        }

        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
        .alert-success { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }

        @media (max-width: 480px) {
            .auth-card { padding: 40px 25px; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div class="auth-card">
        <div class="header">
            <i class="fas fa-key"></i>
            <h1>Account Recovery</h1>
            <p>Verification protocol initiated</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <!-- Step 1: Email -->
        <div id="stepEmail">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your registered email" required>
            </div>
            <button type="button" class="btn-luxury" onclick="sendOTP()">Initialize Verification <i class="fas fa-paper-plane"></i></button>
        </div>

        <!-- Step 2: OTP -->
        <div id="stepOtp" style="display: none;">
            <div class="input-group">
                <label>Verification Code</label>
                <input type="text" id="otp" placeholder="6-digit code" maxlength="6">
            </div>
            <button type="button" class="btn-luxury" onclick="verifyOTP()">Verify Identity <i class="fas fa-shield-alt"></i></button>
            <p style="text-align: center; margin-top: 15px; font-size: 13px;">
                Didn't receive it? <a href="#" onclick="sendOTP()" style="color: var(--pink-primary); font-weight: 600;">Resend</a>
            </p>
        </div>

        <!-- Step 3: New Password -->
        <div id="stepPassword" style="display: none;">
            <div class="input-group">
                <label>New Master Password</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button type="button" class="btn-luxury" onclick="resetPassword()">Update Credentials <i class="fas fa-check-circle"></i></button>
        </div>

        <div class="footer-links">
            Remembered your access? <a href="login.html">Return to Portal</a>
        </div>
    </div>

    <script>
        let currentEmail = '';

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function sendOTP() {
            const emailInput = document.getElementById("email");
            const email = emailInput?.value?.trim();

            if (!email) {
                alert("Enter email");
                return;
            }

            fetch("/api/send-otp", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message || "OTP Sent");
                if (data.success) {
                    currentEmail = email;
                    document.getElementById('stepEmail').style.display = 'none';
                    document.getElementById('stepOtp').style.display = 'block';
                    showAlert('Verification code sent to your email', 'success');
                }
            })
            .catch(err => {
                console.error(err);
                alert("Server error");
            });
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp').value;
            if (!otp) return showAlert('Enter the code', 'error');

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('stepOtp').style.display = 'none';
                    document.getElementById('stepPassword').style.display = 'block';
                    showAlert('Identity verified. Set new password.', 'success');
                } else {
                    showAlert(data.error || 'Invalid code', 'error');
                }
            } catch (err) {
                showAlert('Verification failed', 'error');
            }
        }

        async function resetPassword() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) return showAlert('Passwords do not match', 'error');
            if (password.length < 6) return showAlert('Password too weak', 'error');

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, password })
                });

                if (res.ok) {
                    showAlert('Credentials updated successfully. Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showAlert('Update failed', 'error');
                }
            } catch (err) {
                showAlert('Error updating password', 'error');
            }
        }
    </script>
</body>
</html>
