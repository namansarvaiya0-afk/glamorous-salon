<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#e91e63">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Restore Your Access | Glamorous Studio Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink-primary: #e91e63;
            --pink-soft: #ff85a1;
            --gold-primary: #d4af37;
            --black-rich: #0f172a;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-light: #fdfbfb;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            overflow: hidden;
        }

        /* Abstract Premium Background Elements */
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(233, 30, 99, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            position: relative;
        }

        .auth-card {
            background: var(--glass);
            border-radius: 40px;
            padding: 60px 45px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            text-align: center;
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
        }

        .logo-wrap { margin-bottom: 35px; }
        .logo-wrap i {
            font-size: 42px;
            color: var(--pink-primary);
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(233, 30, 99, 0.2));
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: var(--black-rich);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--pink-primary);
            background: white;
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.08);
            transform: translateY(-2px);
        }

        .btn-luxury {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--pink-primary), #ce1452);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 15px 30px rgba(233, 30, 99, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-luxury:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(233, 30, 99, 0.35);
            filter: brightness(1.1);
        }

        .btn-luxury:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        .footer-links {
            margin-top: 35px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--pink-primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: 0.3s;
        }

        .footer-links a:hover { text-decoration: underline; }

        /* Custom Alert */
        .alert {
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 14px;
            margin-bottom: 25px;
            display: none;
            animation: slideDown 0.4s easeOut;
        }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
        }

        @media (max-width: 480px) {
            .auth-card { padding: 40px 25px; border-radius: 30px; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow" style="top: -100px; left: -100px;"></div>
    <div class="bg-glow" style="bottom: -100px; right: -100px;"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-wrap">
                <i class="fas fa-spa"></i>
            </div>
            <div class="header">
                <h1>Elegance Restored</h1>
                <p>Begin your ritual to regain access to your sanctuary.</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <div class="input-group">
                <label>Registered Identity</label>
                <input type="email" id="email" placeholder="email@luxury.com" required>
            </div>

            <button class="btn-luxury" id="otpBtn" onclick="sendOTP()">
                <span>Invoke Recovery</span>
                <i class="fas fa-magic"></i>
            </button>

            <div class="footer-links">
                Remembered? <a href="login.html">Back to Sign In</a>
            </div>
        </div>
    </div>

    <script>
        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        async function sendOTP() {
            const emailInput = document.getElementById('email');
            const userEmail = emailInput.value;
            
            // 📧 Email Format Validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!userEmail || !emailRegex.test(userEmail)) {
                return showAlert('Please enter a valid luxury email address', 'error');
            }
            
            const btn = document.getElementById("otpBtn");
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Establishing connection... <i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('recoveryEmail', userEmail);
                    alert("A verification ritual has been initiated. Check your inbox.");
                    window.location.href = 'verify-otp.html';
                } else {
                    showAlert(data.error || data.message || 'Identity not found in our records.', 'error');
                }
            } catch (e) {
                showAlert('Connection to our sanctuary timed out.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
