<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Access - Glamorous Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink-primary: #ff2d75;
            --black-rich: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.85);
            --radius: 30px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--black-rich);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 70% 20%, #2d0a1a 0%, transparent 45%),
                        radial-gradient(circle at 10% 80%, #1a150a 0%, transparent 45%);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: var(--radius);
            width: 100%; max-width: 460px;
            padding: 60px 45px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            animation: cardScaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardScaleIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header i { font-size: 40px; color: var(--pink-primary); margin-bottom: 20px; display: block; }
        .header h1 { font-family: 'Playfair Display'; font-size: 32px; color: var(--black-rich); margin-bottom: 8px; }
        .header p { color: #666; font-size: 15px; }

        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } }

        .input-group { position: relative; margin-bottom: 25px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--black-rich); margin-bottom: 10px; }
        .input-group input {
            width: 100%; padding: 18px 20px; border-radius: 15px;
            border: 1.5px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.6);
            font-family: inherit; font-size: 16px; color: var(--black-rich);
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none; border-color: var(--pink-primary);
            background: white; box-shadow: 0 10px 25px rgba(255, 45, 117, 0.08);
        }

        .btn-luxury {
            width: 100%; padding: 20px; border-radius: 50px; border: none;
            background: var(--black-rich); color: white;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.4s; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-luxury:hover { background: var(--pink-primary); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 45, 117, 0.2); }
        .btn-luxury:disabled { opacity: 0.6; cursor: not-allowed; }

        .footer-links { text-align: center; margin-top: 35px; font-size: 14px; color: #666; }
        .footer-links a { color: var(--pink-primary); font-weight: 700; text-decoration: none; }

        .spinner {
            display: none; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .alert {
            padding: 15px; border-radius: 12px; margin-bottom: 25px;
            text-align: center; font-size: 14px; display: none;
        }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

        .otp-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .otp-grid input { text-align: center; font-size: 24px; font-weight: 700; padding: 15px 0; }

        button {
          z-index: 9999;
          position: relative;
        }

    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="auth-card">
        <div class="header">
            <i class="fas fa-key"></i>
            <h1>Account Recovery</h1>
            <p>Securely reset your password</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <!-- Step 1: Email -->
        <div id="step1" class="form-step active">
            <input type="email" id="recoveryEmail" placeholder="Enter email">
            <button id="otpBtn">Send OTP</button>
            <div class="footer-links">
                Remembered it? <a href="login.html">Back to Sign In</a>
            </div>
        </div>

        <!-- Step 2: OTP -->
        <div id="step2" class="form-step">
            <div class="input-group">
                <label>Verification Code</label>
                <div class="otp-grid">
                    <input type="text" maxlength="1" oninput="moveFocus(this, 1)">
                    <input type="text" maxlength="1" oninput="moveFocus(this, 2)">
                    <input type="text" maxlength="1" oninput="moveFocus(this, 3)">
                    <input type="text" maxlength="1" oninput="moveFocus(this, 4)">
                    <input type="text" maxlength="1" oninput="moveFocus(this, 5)">
                    <input type="text" maxlength="1" oninput="moveFocus(this, 6)">
                </div>
            </div>
            <button class="btn-luxury" onclick="verifyOTP()">
                <span class="btn-text">Verify Code</span>
                <i class="fas fa-check-circle"></i>
                <div class="spinner"></div>
            </button>
            <div class="footer-links">
                Didn't get code? <a href="#" onclick="sendOTP()">Resend</a>
            </div>
        </div>

        <!-- Step 3: New Password -->
        <div id="step3" class="form-step">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPass" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPass" placeholder="••••••••" required>
            </div>
            <button class="btn-luxury" onclick="resetPassword()">
                <span class="btn-text">Update Password</span>
                <i class="fas fa-lock"></i>
                <div class="spinner"></div>
            </button>
        </div>
    </div>

    <script>
        let userEmail = '';
        let verifiedOTP = '';

        function moveFocus(el, index) {
            if (el.value.length === 1 && index < 6) {
                document.querySelectorAll('.otp-grid input')[index].focus();
            }
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function setLoading(btn, isLoading) {
            const text = btn.querySelector('.btn-text');
            const icon = btn.querySelector('i');
            const spinner = btn.querySelector('.spinner');
            btn.disabled = isLoading;
            text.style.display = isLoading ? 'none' : 'block';
            icon.style.display = isLoading ? 'none' : 'block';
            spinner.style.display = isLoading ? 'block' : 'none';
        }

        document.getElementById("otpBtn").addEventListener("click", () => {
          console.log("CLICKED");
          alert("Button Working ✅");
        });

        async function verifyOTP() {
            const inputs = document.querySelectorAll('.otp-grid input');
            const otp = Array.from(inputs).map(i => i.value).join('');
            
            if (otp.length < 6) return showAlert('Enter full 6-digit code', 'error');

            const btn = document.querySelector('#step2 .btn-luxury');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp })
                });
                const data = await res.json();
                
                if (res.ok) {
                    verifiedOTP = otp;
                    document.getElementById('step2').classList.remove('active');
                    document.getElementById('step3').classList.add('active');
                    showAlert('OTP Verified! Set your new password.', 'success');
                } else {
                    showAlert(data.error || 'Invalid OTP', 'error');
                }
            } catch (e) {
                showAlert('Server connection error', 'error');
            } finally {
                setLoading(btn, false);
            }
        }

        async function resetPassword() {
            const pass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;
            
            if (pass.length < 8) return showAlert('Password must be 8+ characters', 'error');
            if (pass !== confirm) return showAlert('Passwords do not match', 'error');

            const btn = document.querySelector('#step3 .btn-luxury');
            setLoading(btn, true);

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, newPassword: pass })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('Success! Your password is updated.', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showAlert(data.error || 'Reset failed', 'error');
                }
            } catch (e) {
                showAlert('Server connection error', 'error');
            } finally {
                setLoading(btn, false);
            }
        }
    </script>
</body>
</html>
