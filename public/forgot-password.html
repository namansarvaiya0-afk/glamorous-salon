<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Access - Glamorous Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff3366;
            --secondary: #6c5ce7;
            --dark: #0f0c29;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a0b2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            color: var(--text-main);
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s infinite ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            width: 100%; max-width: 440px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header-icon { 
            width: 70px; height: 70px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 10px 25px rgba(255, 51, 102, 0.4);
        }
        .header-icon i { font-size: 30px; color: white; }
        
        .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(to right, #fff, #eca0b6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); font-size: 15px; font-weight: 300; }

        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .input-group { position: relative; margin-bottom: 25px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; padding-left: 5px; }
        
        .input-group input[type="email"], .input-group input[type="password"], #recoveryEmail {
            width: 100%; padding: 18px 24px; border-radius: var(--radius-md);
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
            font-family: inherit; font-size: 16px; color: white;
            transition: all 0.3s ease;
            margin-bottom: 15px; /* Added margin for direct inputs like #recoveryEmail */
        }
        .input-group input::placeholder, #recoveryEmail::placeholder { color: rgba(255,255,255,0.3); }
        .input-group input:focus, #recoveryEmail:focus {
            outline: none; border-color: var(--primary);
            background: rgba(0,0,0,0.4); box-shadow: 0 0 20px rgba(255, 51, 102, 0.15);
        }

        .btn-luxury, #otpBtn {
            width: 100%; padding: 18px; border-radius: var(--radius-md); border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-family: inherit; font-size: 16px; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2);
            position: relative; overflow: hidden;
        }
        .btn-luxury::after, #otpBtn::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .btn-luxury:hover, #otpBtn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(255, 51, 102, 0.35); }
        .btn-luxury:hover::after, #otpBtn:hover::after { opacity: 1; }
        .btn-luxury:active, #otpBtn:active { transform: translateY(1px); }
        .btn-luxury:disabled, #otpBtn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .footer-links { text-align: center; margin-top: 35px; font-size: 14px; color: var(--text-muted); }
        .footer-links a { color: var(--primary); font-weight: 600; text-decoration: none; transition: 0.3s; }
        .footer-links a:hover { color: white; text-shadow: 0 0 10px var(--primary); }

        .spinner {
            display: none; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .alert {
            padding: 16px; border-radius: var(--radius-md); margin-bottom: 25px;
            text-align: center; font-size: 14px; font-weight: 600; display: none;
            backdrop-filter: blur(10px);
        }
        .alert-error { background: rgba(220, 38, 38, 0.15); color: #fca5a5; border: 1px solid rgba(220, 38, 38, 0.3); }
        .alert-success { background: rgba(21, 128, 61, 0.15); color: #86efac; border: 1px solid rgba(21, 128, 61, 0.3); }

        .otp-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .otp-grid input { 
            text-align: center; font-size: 24px; font-weight: 700; padding: 16px 0;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white; transition: 0.3s;
        }
        .otp-grid input:focus {
            outline: none; border-color: var(--secondary);
            background: rgba(0,0,0,0.5); box-shadow: 0 0 15px rgba(108, 92, 231, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="auth-card">
        <div class="header">
            <div class="header-icon"><i class="fas fa-fingerprint"></i></div>
            <h1>Account Recovery</h1>
            <p>Your secure portal to regain access</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <!-- Step 1: Email -->
        <div id="step1" class="form-step active">
            <input type="email" id="email" placeholder="Enter email">
            <button id="otpBtn">Send OTP</button>
            <div class="footer-links">
                Remembered it? <a href="login.html">Back to Sign In</a>
            </div>
        </div>

    </div>

    <script>
        let userEmail = '';

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        async function sendOTP() {
            const emailInput = document.getElementById('email');
            userEmail = emailInput.value;
            if (!userEmail) return showAlert('Please enter your email', 'error');
            
            const btn = document.getElementById("otpBtn");
            btn.disabled = true;
            btn.textContent = "Sending...";

            try {
                const res = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('recoveryEmail', userEmail);
                    alert(data.message || 'OTP Sent! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'verify-otp.html';
                    }, 1000);
                } else {
                    showAlert(data.error || data.message || 'Failed to send OTP', 'error');
                }
            } catch (e) {
                showAlert('Server connection error', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = "Send OTP";
            }
        }

        document.getElementById("otpBtn").addEventListener("click", sendOTP);
    </script>
</body>
</html>
