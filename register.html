<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Elite - Glamorous Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink-primary: #ff2d75;
            --pink-dark: #d4145a;
            --gold-primary: #d4af37;
            --black-rich: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.8);
            --radius: 24px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--black-rich);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 20% 30%, #2d0a1a 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #1a150a 0%, transparent 40%);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--radius);
            width: 100%; max-width: 520px;
            padding: 50px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Playfair Display'; font-size: 36px; color: var(--black-rich); margin-bottom: 10px; }
        .header p { color: #555; font-size: 16px; letter-spacing: 0.5px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--black-rich); margin-bottom: 8px; }
        .input-group input {
            width: 100%; padding: 15px 18px; border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.5);
            font-family: inherit; font-size: 15px; color: var(--black-rich);
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none; border-color: var(--pink-primary);
            background: white; box-shadow: 0 0 0 4px rgba(255, 45, 117, 0.1);
        }

        .pass-toggle { position: absolute; right: 15px; top: 40px; cursor: pointer; color: #777; transition: color 0.3s; }
        .pass-toggle:hover { color: var(--pink-primary); }

        /* Password Requirements Checkbox Style */
        .req-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.03); border-radius: 12px;
        }
        .req-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #777; transition: all 0.3s; }
        .req-item i { font-size: 10px; width: 14px; }
        .req-item.met { color: #059669; font-weight: 600; }
        .req-item.met i { color: #059669; }

        .btn-luxury {
            width: 100%; padding: 18px; border-radius: 50px; border: none;
            background: var(--black-rich); color: white;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-luxury:hover { background: var(--pink-primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 45, 117, 0.2); }

        .footer-links { text-align: center; margin-top: 30px; font-size: 14px; color: #555; }
        .footer-links a { color: var(--pink-primary); font-weight: 700; text-decoration: none; }
        
        .alert {
            padding: 12px; border-radius: 10px; margin-bottom: 20px;
            text-align: center; font-size: 14px; display: none;
        }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
        .alert-success { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }

        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="auth-card">
        <div class="header">
            <a href="index.html" style="text-decoration: none; display: inline-block; margin-bottom: 20px;">
                <i class="fas fa-spa" style="font-size: 40px; color: var(--pink-primary);"></i>
            </a>
            <h1>Join the Studio</h1>
            <p>Access exclusive beauty transformations</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="regForm" onsubmit="handleSubmit(event)">
            <div class="form-grid">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required placeholder="Aria">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required placeholder="Sterling">
                </div>
                <div class="input-group full-width">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="aria@luxury.com">
                </div>
                <div class="input-group full-width">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+91 90000 00000">
                </div>
                <div class="input-group full-width">
                    <label>Create Password</label>
                    <input type="password" id="password" required oninput="validatePass(this.value)">
                    <i class="fas fa-eye pass-toggle" onclick="togglePass('password', this)"></i>
                    <div class="req-box">
                        <div class="req-item" id="req-len"><i class="fas fa-circle"></i> 8+ Characters</div>
                        <div class="req-item" id="req-up"><i class="fas fa-circle"></i> Uppercase</div>
                        <div class="req-item" id="req-low"><i class="fas fa-circle"></i> Lowercase</div>
                        <div class="req-item" id="req-sym"><i class="fas fa-circle"></i> Special Symbol</div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-luxury">Create Account <i class="fas fa-arrow-right"></i></button>

            <div class="footer-links">
                Already a member? <a href="login.html">Sign In</a>
            </div>
        </form>
    </div>

    <script>
        function togglePass(id, icon) {
            const el = document.getElementById(id);
            if(el.type === 'password') {
                el.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                el.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function validatePass(val) {
            const reqs = {
                len: val.length >= 8,
                up: /[A-Z]/.test(val),
                low: /[a-z]/.test(val),
                sym: /[!@#$%^&*(),.?":{}|<>]/.test(val)
            };

            for(const k in reqs) {
                const item = document.getElementById(`req-${k}`);
                if(reqs[k]) {
                    item.classList.add('met');
                    item.querySelector('i').classList.replace('fa-circle', 'fa-check-circle');
                } else {
                    item.classList.remove('met');
                    item.querySelector('i').classList.replace('fa-check-circle', 'fa-circle');
                }
            }
            return Object.values(reqs).every(v => v === true);
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const phone = document.getElementById('phone').value;
            const alert = document.getElementById('alertBox');

            if(!validatePass(password)) {
                alert.textContent = "Please fulfill all password requirements";
                alert.className = "alert alert-error";
                alert.style.display = "block";
                return;
            }

            try {
                const response = await fetch('https://glamoroussalon-1.onrender.com/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, phone, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert.textContent = "Welcome to the Studio! Redirecting to login...";
                    alert.className = "alert alert-success";
                    alert.style.display = "block";
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    alert.textContent = data.error || 'Registration failed. Please try again.';
                    alert.className = "alert alert-error";
                    alert.style.display = "block";
                }
            } catch (error) {
                console.error('Error:', error);
                alert.textContent = 'Connection to sanctuary failed. Please check your network.';
                alert.className = "alert alert-error";
                alert.style.display = "block";
            }
        }
    </script>
</body>
</html>
